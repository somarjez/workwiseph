# Render Blueprint for the WorkWise PH backend API.
# Create the service from the Render dashboard: New > Blueprint, point at this repo.
services:
  - type: web
    name: workwise-api
    runtime: python
    plan: free
    rootDir: .
    buildCommand: "pip install -e backend"
    startCommand: "uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false          # set to the Neon POOLED connection string in the dashboard
      - key: CORS_ORIGINS
        sync: false          # set to your Vercel URL, e.g. https://workwiseph.vercel.app
      - key: SECRET_KEY
        generateValue: true
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: ADMIN_USERNAME
        sync: false          # set the admin login username
      - key: ADMIN_PASSWORD
        sync: false          # set a strong admin password

  # Monthly data refresh + forecast regeneration (PSA publishes monthly).
  - type: cron
    name: workwise-refresh
    runtime: python
    plan: free
    schedule: "0 2 5 * *"     # 02:00 on the 5th of each month
    buildCommand: "pip install -e backend"
    startCommand: "python -m data_pipeline.scripts.run_etl && python -m data_pipeline.scripts.generate_forecasts"
    envVars:
      - key: DATABASE_URL
        sync: false
